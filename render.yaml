services:
  - type: web
    name: syknetscope-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VT_API_KEY
        sync: false   # set this manually in Render dashboard
    healthCheckPath: /