<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRecon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>WebRecon</h1>
<p>Website Security Analyzer</p>

<input type="text" id="domain" placeholder="example.com">

<div class="buttons">
    <button onclick="runPassiveScan()">Run Passive Scan</button>
    <button class="danger" onclick="runActiveScan()">Run Active Scan</button>
</div>

<hr>

<h2>Passive Recon Results</h2>
<pre id="passiveResult">No scan performed yet.</pre>

<hr>

<h2>Active Recon Results</h2>
<p id="activeStatus">No active scan performed yet.</p>

<!-- PORT SCAN -->
<h3>Open Ports</h3>
<table id="portsTable">
    <thead>
        <tr>
            <th>Port</th>
            <th>Protocol</th>
            <th>Service</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td colspan="3">No data</td>
        </tr>
    </tbody>
</table>

<!-- SUBDOMAINS -->
<h3>Discovered Subdomains</h3>
<pre id="subdomainResult">No data</pre>

<!-- DIRECTORIES -->
<h3>Discovered Directories</h3>
<pre id="directoryResult">No data</pre>

<!-- API DISCOVERY -->
<h3>API Endpoints</h3>
<pre id="apiResult">No data</pre>

<!-- API SUBDOMAIN DISCOVERY -->
<h3>API Subdomains</h3>
<pre id="apiSubdomainResult">No data</pre>

<script src="script.js"></script>
</body>
</html>
